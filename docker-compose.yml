version: '3.8'

services:
  video-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic-mirror-video-service
    ports:
      - "3001:3000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      FASTAPI_CALLBACK_URL: ${FASTAPI_CALLBACK_URL}
    restart: unless-stopped
